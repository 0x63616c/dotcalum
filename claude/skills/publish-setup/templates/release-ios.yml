name: Release iOS (TestFlight)

# Triggered by pushing a version tag, e.g. `git tag v0.1.0 && git push --tags`.
# Or run manually from the Actions tab (workflow_dispatch).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  testflight:
    runs-on: macos-latest # free standard runner on public repos
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2 # for Capacitor web build; harmless if unused

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Decode signing certificate
        env:
          SIGNING_P12: ${{ secrets.SIGNING_P12 }}
        run: |
          echo "$SIGNING_P12" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          echo "CERT_P12_PATH=$RUNNER_TEMP/dist.p12" >> "$GITHUB_ENV"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROVISIONING_PROFILE" | base64 --decode \
            > "$HOME/Library/MobileDevice/Provisioning Profiles/ci.mobileprovision"

      - name: Build & upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          SIGNING_P12_PASSWORD: ${{ secrets.SIGNING_P12_PASSWORD }}
        run: bundle exec fastlane ios release
